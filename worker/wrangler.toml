name = "better-aa-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Run the ingest once per day at 06:00 UTC.
[triggers]
crons = ["0 6 * * *"]

# Workers KV namespace that holds the latest daily snapshot.
# Create it with:  wrangler kv namespace create SNAPSHOT_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "SNAPSHOT_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
# Public, non-secret config. The AA key is a secret (see README):
#   wrangler secret put AA_API_KEY
# Optional shared secret to guard the manual /seed route in production.
SEED_TOKEN = ""
