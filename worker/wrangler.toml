name = "better-aa-worker"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Run the ingest once per day at 06:00 UTC.
[triggers]
crons = ["0 6 * * *"]

# Workers KV namespace that holds the latest daily snapshot.
# Create it with:  wrangler kv namespace create SNAPSHOT_KV
# then paste the returned id below.
[[kv_namespaces]]
binding = "SNAPSHOT_KV"
id = "02a9392af126409d93433284d1313463"

# Secrets (set via `wrangler secret put`, never committed):
#   AA_API_KEY  — Artificial Analysis API key
#   SEED_TOKEN  — guards the manual /seed route; call /seed?token=<SEED_TOKEN>
